# Pupil Labs Neon Eye Tracker - Small (2 participants)
# Use case: Eye tracking research, gaze analysis, blink detection
#
# Realistic Sampling Rates (based on Pupil Neon specs):
# - Eye gaze: 200Hz (research-grade tracking)
# - Blink detection: 30Hz (captures full blink dynamics)
# - Eye aperture: 30Hz (synchronized with blink)
# - Worn detection: 1Hz (device state)
# - IMU: 110Hz (accelerometer + gyroscope for head movement, all 3 axes)
# - Battery: 0.1Hz (every 10 seconds)
#
# Activity profiles:
# - Participant 1 (Reader): Seated, minimal head movement, calm reading
# - Participant 2 (Explorer): Active head scanning, frequent turns, physical search

connectors:
  pupil_neon_demo:
    connector_id: "pupil_neon_demo"
    connector_name: "Pupil_Neon_Eye_Tracker"
    sensors:
      # Participant 1: Reading task — seated, calm, minimal head movement
      neon_reader_1:
        sensor_id: "neon_reader_1"
        sensor_name: "Neon_Reader_P1"
        attributes:
          eye_gaze:
            attribute_id: "eye_gaze"
            sensor_type: "eye_gaze"
            batch_size: 10
            batch_window: 50
            duration: 0
            sampling_rate: 200
            fixation_duration: 350
            saccade_duration: 40
          eye_blink:
            attribute_id: "eye_blink"
            sensor_type: "eye_blink"
            batch_size: 1
            batch_window: 33
            duration: 0
            sampling_rate: 30
            dummy_data: true
          eye_aperture:
            attribute_id: "eye_aperture"
            sensor_type: "eye_aperture"
            batch_size: 1
            batch_window: 33
            duration: 0
            sampling_rate: 30
          eye_worn:
            attribute_id: "eye_worn"
            sensor_type: "eye_worn"
            batch_size: 1
            batch_window: 1000
            duration: 0
            sampling_rate: 1
            dummy_data: true
          # IMU — 3 accelerometer axes (calm seated reading)
          accelerometer_x:
            attribute_id: "accelerometer_x"
            sensor_type: "accelerometer_x"
            batch_size: 5
            batch_window: 45
            duration: 0
            sampling_rate: 110
            activity_level: 0.2
            dummy_data: true
          accelerometer_y:
            attribute_id: "accelerometer_y"
            sensor_type: "accelerometer_y"
            batch_size: 5
            batch_window: 45
            duration: 0
            sampling_rate: 110
            activity_level: 0.15
            dummy_data: true
          accelerometer_z:
            attribute_id: "accelerometer_z"
            sensor_type: "accelerometer_z"
            batch_size: 5
            batch_window: 45
            duration: 0
            sampling_rate: 110
            activity_level: 0.1
            dummy_data: true
          # IMU — 3 gyroscope axes (calm seated reading)
          gyroscope_x:
            attribute_id: "gyroscope_x"
            sensor_type: "gyroscope_x"
            batch_size: 5
            batch_window: 45
            duration: 0
            sampling_rate: 110
            activity_level: 0.15
            dummy_data: true
          gyroscope_y:
            attribute_id: "gyroscope_y"
            sensor_type: "gyroscope_y"
            batch_size: 5
            batch_window: 45
            duration: 0
            sampling_rate: 110
            activity_level: 0.1
            dummy_data: true
          gyroscope_z:
            attribute_id: "gyroscope_z"
            sensor_type: "gyroscope_z"
            batch_size: 5
            batch_window: 45
            duration: 0
            sampling_rate: 110
            activity_level: 0.1
            dummy_data: true
          battery:
            attribute_id: "battery"
            sensor_type: "battery"
            batch_size: 1
            batch_window: 10000
            duration: 0
            sampling_rate: 0.1
            min_value: 65
            max_value: 85

      # Participant 2: Active visual search — walking, scanning, turning head
      neon_explorer_2:
        sensor_id: "neon_explorer_2"
        sensor_name: "Neon_Explorer_P2"
        attributes:
          eye_gaze:
            attribute_id: "eye_gaze"
            sensor_type: "eye_gaze"
            batch_size: 10
            batch_window: 50
            duration: 0
            sampling_rate: 200
            fixation_duration: 150
            saccade_duration: 25
          eye_blink:
            attribute_id: "eye_blink"
            sensor_type: "eye_blink"
            batch_size: 1
            batch_window: 33
            duration: 0
            sampling_rate: 30
            dummy_data: true
          eye_aperture:
            attribute_id: "eye_aperture"
            sensor_type: "eye_aperture"
            batch_size: 1
            batch_window: 33
            duration: 0
            sampling_rate: 30
          eye_worn:
            attribute_id: "eye_worn"
            sensor_type: "eye_worn"
            batch_size: 1
            batch_window: 1000
            duration: 0
            sampling_rate: 1
            dummy_data: true
          # IMU — 3 accelerometer axes (active walking/scanning)
          accelerometer_x:
            attribute_id: "accelerometer_x"
            sensor_type: "accelerometer_x"
            batch_size: 5
            batch_window: 45
            duration: 0
            sampling_rate: 110
            activity_level: 0.9
            dummy_data: true
          accelerometer_y:
            attribute_id: "accelerometer_y"
            sensor_type: "accelerometer_y"
            batch_size: 5
            batch_window: 45
            duration: 0
            sampling_rate: 110
            activity_level: 0.7
            dummy_data: true
          accelerometer_z:
            attribute_id: "accelerometer_z"
            sensor_type: "accelerometer_z"
            batch_size: 5
            batch_window: 45
            duration: 0
            sampling_rate: 110
            activity_level: 0.5
            dummy_data: true
          # IMU — 3 gyroscope axes (active head scanning)
          gyroscope_x:
            attribute_id: "gyroscope_x"
            sensor_type: "gyroscope_x"
            batch_size: 5
            batch_window: 45
            duration: 0
            sampling_rate: 110
            activity_level: 0.8
            dummy_data: true
          gyroscope_y:
            attribute_id: "gyroscope_y"
            sensor_type: "gyroscope_y"
            batch_size: 5
            batch_window: 45
            duration: 0
            sampling_rate: 110
            activity_level: 0.6
            dummy_data: true
          gyroscope_z:
            attribute_id: "gyroscope_z"
            sensor_type: "gyroscope_z"
            batch_size: 5
            batch_window: 45
            duration: 0
            sampling_rate: 110
            activity_level: 1.0
            dummy_data: true
          battery:
            attribute_id: "battery"
            sensor_type: "battery"
            batch_size: 1
            batch_window: 10000
            duration: 0
            sampling_rate: 0.1
            min_value: 40
            max_value: 60
